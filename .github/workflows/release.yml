name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)publish (e.g. v0.1.0). The tag must already exist on origin."
        required: true
      platforms:
        description: "Comma-separated platforms to build (default: all 4). e.g. mac-arm64,win-x64"
        required: false
        default: "mac-arm64,mac-x64,win-x64,linux-x64"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  resolve:
    name: Resolve ref + notes
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      notes: ${{ steps.notes.outputs.notes }}
      platforms: ${{ steps.platforms.outputs.platforms }}
    steps:
      - id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - id: notes
        shell: bash
        run: |
          tag="${{ steps.ref.outputs.ref }}"
          notes="$(git tag -l --format='%(contents:body)' "$tag" || true)"
          if [[ -z "$notes" ]]; then
            notes="$(git tag -l --format='%(contents)' "$tag" || true)"
          fi
          {
            echo 'notes<<NOTES_EOF'
            printf '%s\n' "$notes"
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - id: platforms
        shell: bash
        run: |
          # `platforms` narrows which matrix jobs run this time; the release's
          # canonical expectedPlatforms set is always the full 4. A
          # workflow_dispatch with a narrowed list rebuilds a single failed
          # platform without changing what "complete" means for the release.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "platforms=${{ inputs.platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=mac-arm64,mac-x64,win-x64,linux-x64" >> "$GITHUB_OUTPUT"
          fi

  prepare:
    name: Prepare release record
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Create-or-get release on academy
        env:
          MISSION_CONTROL_RELEASE_TOKEN: ${{ secrets.MISSION_CONTROL_RELEASE_TOKEN }}
          ACADEMY_BASE_URL: ${{ secrets.ACADEMY_BASE_URL }}
          RELEASE_VERSION: ${{ needs.resolve.outputs.ref }}
          RELEASE_NOTES: ${{ needs.resolve.outputs.notes }}
          # Canonical full set — never narrowed by workflow_dispatch.platforms,
          # which only controls *which jobs run this time*.
          RELEASE_EXPECTED_PLATFORMS: "mac-arm64,mac-x64,win-x64,linux-x64"
        run: node scripts/publish-release.mjs prepare

  build:
    name: Build + publish (${{ matrix.platform }})
    needs: [resolve, prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac-arm64
            builder_flags: "--mac --arm64"
            artifact_ext: "dmg"
          - os: macos-latest
            platform: mac-x64
            builder_flags: "--mac --x64"
            artifact_ext: "dmg"
          - os: windows-latest
            platform: win-x64
            builder_flags: "--win --x64"
            artifact_ext: "exe"
          - os: ubuntu-latest
            platform: linux-x64
            builder_flags: "--linux --x64"
            artifact_ext: "AppImage"

    runs-on: ${{ matrix.os }}
    # Cap each platform build so a hung job (notably mac-x64) can't block the
    # rest. fail-fast: false above keeps siblings running; finalize tolerates
    # missing platforms by leaving the release as a draft.
    timeout-minutes: 15
    # Skip platforms not requested for this run (workflow_dispatch with a
    # narrowed platforms list lets you rebuild a single failed binary).
    if: contains(needs.resolve.outputs.platforms, matrix.platform)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # node-gyp 9.x (pulled in transitively by @electron/rebuild) imports
      # distutils, which Python 3.12 removed. macos-latest ships 3.12+, so
      # pin 3.11 to keep native rebuilds (node-pty under x64 cross-build) working.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web + electron tsc
        shell: bash
        run: |
          pnpm build
          pnpm native:electron

      - name: Run electron-builder
        shell: bash
        run: |
          pnpm exec electron-builder ${{ matrix.builder_flags }} --publish never -c.directories.output=dist-electron-out

      - name: List build output (debug)
        shell: bash
        run: |
          echo "--- dist-electron-out ---"
          ls -la dist-electron-out/ || true
          echo "--- dist (web bundle) ---"
          ls -la dist/ || true

      - name: Compute manifest + stage artifact
        shell: bash
        run: |
          mkdir -p artifacts
          shopt -s nullglob
          files=( dist-electron-out/*.${{ matrix.artifact_ext }} )
          if (( ${#files[@]} == 0 )); then
            echo "No artifacts matched dist-electron-out/*.${{ matrix.artifact_ext }}"
            ls -la dist-electron-out/ || true
            exit 1
          fi
          src="${files[0]}"
          name="$(basename "$src")"
          cp "$src" "artifacts/$name"
          if command -v sha256sum >/dev/null; then
            sha="$(sha256sum "artifacts/$name" | awk '{print $1}')"
          else
            sha="$(shasum -a 256 "artifacts/$name" | awk '{print $1}')"
          fi
          size="$(wc -c < "artifacts/$name" | tr -d ' ')"
          case "$name" in
            *.dmg) ct="application/x-apple-diskimage" ;;
            *.exe) ct="application/vnd.microsoft.portable-executable" ;;
            *.AppImage) ct="application/x-executable" ;;
            *) ct="application/octet-stream" ;;
          esac
          cat > artifacts/manifest.json <<EOF
          {
            "platform": "${{ matrix.platform }}",
            "fileName": "$name",
            "sizeBytes": $size,
            "sha256": "$sha",
            "contentType": "$ct"
          }
          EOF
          echo "Built $name ($size bytes, sha256=$sha)"

      - name: Publish asset to academy
        env:
          MISSION_CONTROL_RELEASE_TOKEN: ${{ secrets.MISSION_CONTROL_RELEASE_TOKEN }}
          ACADEMY_BASE_URL: ${{ secrets.ACADEMY_BASE_URL }}
          RELEASE_VERSION: ${{ needs.resolve.outputs.ref }}
        run: node scripts/publish-release.mjs publish

  finalize:
    name: Finalize release
    needs: [resolve, build]
    # Run regardless of per-matrix outcome — partial successes still leave the
    # asset rows uploaded; finalize will refuse if any expected platform is
    # missing, which is what we want (release stays a draft, can be completed
    # by re-running the failed platform job).
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    # Don't fail the workflow when finalize can't run (partial release).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Finalize
        env:
          MISSION_CONTROL_RELEASE_TOKEN: ${{ secrets.MISSION_CONTROL_RELEASE_TOKEN }}
          ACADEMY_BASE_URL: ${{ secrets.ACADEMY_BASE_URL }}
          RELEASE_VERSION: ${{ needs.resolve.outputs.ref }}
        run: node scripts/publish-release.mjs finalize
