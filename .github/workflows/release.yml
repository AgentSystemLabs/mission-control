name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)publish (e.g. v0.1.0). The tag must already exist on origin."
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac-arm64
            builder_flags: "--mac --arm64"
            artifact_ext: "dmg"
          - os: macos-latest
            platform: mac-x64
            builder_flags: "--mac --x64"
            artifact_ext: "dmg"
          - os: windows-latest
            platform: win-x64
            builder_flags: "--win --x64"
            artifact_ext: "exe"
          - os: ubuntu-latest
            platform: linux-x64
            builder_flags: "--linux --x64"
            artifact_ext: "AppImage"

    runs-on: ${{ matrix.os }}
    # Cap each platform build so a hung job (notably mac-x64) can't block the
    # rest of the release. fail-fast: false above keeps siblings running; this
    # bound makes "stuck" finite so the publish job can proceed with whatever
    # builds did succeed.
    timeout-minutes: 15
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # node-gyp 9.x (pulled in transitively by @electron/rebuild) imports
      # distutils, which Python 3.12 removed. macos-latest ships 3.12+, so
      # pin 3.11 to keep native rebuilds (node-pty under x64 cross-build) working.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web + electron tsc
        shell: bash
        run: |
          pnpm build
          pnpm native:electron

      - name: Run electron-builder
        shell: bash
        run: |
          # Run electron-builder directly with explicit output dir override so
          # we don't have to fight pnpm arg-forwarding through chained scripts.
          pnpm exec electron-builder ${{ matrix.builder_flags }} --publish never -c.directories.output=dist-electron-out

      - name: List build output (debug)
        shell: bash
        run: |
          echo "--- dist-electron-out ---"
          ls -la dist-electron-out/ || true
          echo "--- dist (web bundle) ---"
          ls -la dist/ || true

      - name: Compute checksums
        shell: bash
        run: |
          mkdir -p artifacts
          shopt -s nullglob
          # Match the platform-specific installer extension.
          files=( dist-electron-out/*.${{ matrix.artifact_ext }} )
          if (( ${#files[@]} == 0 )); then
            echo "No artifacts matched dist-electron-out/*.${{ matrix.artifact_ext }}"
            echo "Contents of dist-electron-out:"
            ls -la dist-electron-out/ || true
            exit 1
          fi
          # The glob already excludes .blockmap / .yml metadata files; pick the
          # first match (typically there's exactly one installer per arch).
          src="${files[0]}"
          name="$(basename "$src")"
          cp "$src" "artifacts/$name"
          if command -v sha256sum >/dev/null; then
            sha="$(sha256sum "artifacts/$name" | awk '{print $1}')"
          else
            sha="$(shasum -a 256 "artifacts/$name" | awk '{print $1}')"
          fi
          size="$(wc -c < "artifacts/$name" | tr -d ' ')"
          # macOS dmg → application/x-apple-diskimage; Windows exe → application/vnd.microsoft.portable-executable;
          # Linux AppImage → application/x-executable.
          case "$name" in
            *.dmg) ct="application/x-apple-diskimage" ;;
            *.exe) ct="application/vnd.microsoft.portable-executable" ;;
            *.AppImage) ct="application/x-executable" ;;
            *) ct="application/octet-stream" ;;
          esac
          cat > artifacts/manifest.json <<EOF
          {
            "platform": "${{ matrix.platform }}",
            "fileName": "$name",
            "sizeBytes": $size,
            "sha256": "$sha",
            "contentType": "$ct"
          }
          EOF
          echo "Built $name ($size bytes, sha256=$sha)"

      - uses: actions/upload-artifact@v4
        with:
          name: mc-${{ matrix.platform }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to academy
    needs: build
    # Run after build finishes regardless of per-matrix outcome — `needs.build`
    # rolls up to `failure` if ANY matrix item fails, but we still want to
    # publish whichever platforms succeeded. Skipped only if the workflow was
    # cancelled. publish-release.mjs warns + skips missing-platform manifests.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: mc-*
          merge-multiple: false

      - name: Extract release notes from tag annotation
        id: notes
        shell: bash
        run: |
          tag="${{ steps.ref.outputs.ref }}"
          # Annotated tag bodies (skip the subject line and any PGP signature lines).
          notes="$(git tag -l --format='%(contents:body)' "$tag" || true)"
          if [[ -z "$notes" ]]; then
            notes="$(git tag -l --format='%(contents)' "$tag" || true)"
          fi
          # Save multi-line via heredoc.
          {
            echo 'notes<<NOTES_EOF'
            printf '%s\n' "$notes"
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Upload to academy
        env:
          MISSION_CONTROL_RELEASE_TOKEN: ${{ secrets.MISSION_CONTROL_RELEASE_TOKEN }}
          ACADEMY_BASE_URL: ${{ secrets.ACADEMY_BASE_URL }}
          RELEASE_VERSION: ${{ steps.ref.outputs.ref }}
          RELEASE_NOTES: ${{ steps.notes.outputs.notes }}
        run: node scripts/publish-release.mjs

      - name: Delete this run's artifacts
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ids=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate -q '.artifacts[].id')
          for id in $ids; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" && echo "deleted $id"
          done
